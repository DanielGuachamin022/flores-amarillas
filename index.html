<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Flores Amarillas 🌼</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #fff9c4, #ffe082);
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
    }

    img {
      width: 250px;
      border-radius: 10px;
      margin: 20px 0;
    }

    button {
      background-color: #fbc02d;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      background-color: #f9a825;
    }

    #flores-container {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .flor {
      font-size: 30px;
      margin: 5px;
      animation: aparecer 0.3s ease;
    }

    @keyframes aparecer {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }
  </style>
</head>
<body>

  <h1>Para ti 💛 mi amor</h1>

  <p>Hoy quiero regalarte flores amarillas 🌼 aunque sea digitales 😘</p>
 <!-- Puedes cambiar esta imagen -->
  <img src="assets/ImagenPaginaAmor.jpeg" alt="Flores amarillas">

  <br>

  <!-- BOTONES -->
  <button onclick="agregarFlor()">Regalar flor 🌼</button>
  <button onclick="agregarGirasol()">Regalar girasol 🌻</button>

  <div id="flores-container"></div>

  <script>
    function agregarFlor() {
      agregarElemento("🌼");
    }

    function agregarGirasol() {
      agregarElemento("🌻");
    }

    function agregarElemento(tipo) {
      const contenedor = document.getElementById("flores-container");

      const flor = document.createElement("div");
      flor.classList.add("flor");
      flor.textContent = tipo;

      contenedor.appendChild(flor);
    }
  </script>

</body>
</html>
